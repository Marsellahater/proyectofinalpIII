<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🌈 Arcade de Juegos</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(270deg, red, orange, yellow, green, cyan, blue, violet);
    background-size: 1400% 1400%;
    animation: arcoiris 15s ease infinite;
    color:white;
}

@keyframes arcoiris{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.titulo{
    text-align:center;
    margin-top:30px;
    font-size:3rem;
    font-weight:bold;
    text-shadow:2px 2px 5px black;
}

.sub{
    text-align:center;
    margin-bottom:30px;
}

.card-juego{
    background: rgba(255,255,255,0.9);
    color:black;
    border-radius:20px;
    padding:30px;
    text-align:center;
    cursor:pointer;
    transition: all 0.3s ease;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.card-juego:hover{
    transform: scale(1.1) rotate(2deg);
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.icono{
    font-size:70px;
}

footer{
    margin-top:40px;
    text-align:center;
    font-size:14px;
    opacity:0.8;
}
</style>
</head>

<body>

<h1 class="titulo">🎮 Mi Arcade 🌈</h1>
<p class="sub">Elige un juego y diviértete</p>

<div class="container">
    <div class="row g-4 justify-content-center">

        <!-- Memoria -->
        <div class="col-6 col-md-4 col-lg-3">
            <div class="card-juego" onclick="abrirJuego('pares.html')">
                <div class="icono">🧠</div>
                <h5>Memoria</h5>
            </div>
        </div>

        <!-- Gato -->
        <div class="col-6 col-md-4 col-lg-3">
            <div class="card-juego" onclick="abrirJuego('gato.html')">
                <div class="icono">❌⭕</div>
                <h5>Gato</h5>
            </div>
        </div>

        <!-- Quiz -->
        <div class="col-6 col-md-4 col-lg-3">
            <div class="card-juego" onclick="abrirJuego('cuestionario.html')">
                <div class="icono">❓</div>
                <h5>Cuestionario</h5>
            </div>
        </div>

        <!-- Crucigrama -->
        <div class="col-6 col-md-4 col-lg-3">
            <div class="card-juego" onclick="abrirJuego('crucigrama.html')">
                <div class="icono">🔤</div>
                <h5>Crucigrama</h5>
            </div>
        </div>

        <!-- Sopa de Letras -->
        <div class="col-6 col-md-4 col-lg-3">
            <div class="card-juego" onclick="abrirJuego('sopadeletras.html')">
                <div class="icono">🔎</div>
                <h5>Sopa de Letras</h5>
            </div>
        </div>

    </div>
</div>

<footer>
    Hecho con ❤️ | Arcade de Juegos
</footer>

<script>
function abrirJuego(nombre){
    window.location.href = nombre;
}
</script>

</body>
</html>
